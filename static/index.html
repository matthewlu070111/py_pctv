<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PCTV 在线播放</title>
    <link rel="stylesheet" href="/src/js/xgplayer-3.0.13/index.min.css">
    <style>
        :root {
            --bg-1: #081826;
            --bg-2: #10304a;
            --panel: rgba(255, 255, 255, 0.94);
            --text: #12222e;
            --muted: #567080;
            --ok: #198754;
            --warn: #c87910;
            --bad: #c9303e;
            --accent: #1f7ab8;
            --accent-2: #1aa59d;
            --border: rgba(18, 34, 46, 0.15);
            --shadow: 0 16px 36px rgba(0, 0, 0, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "IBM Plex Sans", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 10%, rgba(26, 165, 157, 0.32), transparent 36%),
                radial-gradient(circle at 90% 0%, rgba(31, 122, 184, 0.35), transparent 40%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            padding: 18px 14px 26px;
        }

        .wrap {
            max-width: 1260px;
            margin: 0 auto;
            display: grid;
            gap: 14px;
        }

        .top {
            background: rgba(255, 255, 255, 0.13);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            padding: 14px 16px;
            color: #e8f3fc;
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .top h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 0.3px;
        }

        .top p {
            margin: 4px 0 0;
            font-size: 13px;
            color: #d2e6f4;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            height: 36px;
            border-radius: 9px;
            border: 0;
            padding: 0 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .btn-main {
            color: #fff;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
        }

        .btn-ghost {
            color: #11304a;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            box-shadow: var(--shadow);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: end;
        }

        .field label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        select {
            width: 100%;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0 10px;
            font-size: 14px;
            color: var(--text);
            background: #fff;
        }

        .status {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--muted);
            min-height: 20px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: #92a7b7;
        }

        .dot.ok { background: var(--ok); }
        .dot.warn { background: var(--warn); }
        .dot.bad { background: var(--bad); }

        .stage {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            min-height: 260px;
            border-radius: 14px;
            overflow: hidden;
            background:
                linear-gradient(160deg, rgba(7, 22, 34, 0.96), rgba(18, 53, 78, 0.96));
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #video_container {
            width: 100%;
            height: 100%;
        }

        .placeholder {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: #c7ddef;
            font-size: 15px;
            text-align: center;
            padding: 0 14px;
            pointer-events: none;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.2));
        }

        @media (max-width: 820px) {
            .controls {
                grid-template-columns: 1fr;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <section class="top">
        <div>
            <h1>PCTV 在线播放</h1>
            <p>频道列表会自动更新，状态每 20 秒同步一次</p>
        </div>
        <div class="actions">
            <a class="btn btn-ghost" href="/dashboard.html">返回控制台</a>
        </div>
    </section>

    <section class="panel">
        <div class="controls">
            <div class="field">
                <label for="video_select">选择频道</label>
                <select id="video_select"></select>
            </div>
            <button id="play_btn" class="btn btn-main" type="button">开始播放</button>
            <button id="reload_btn" class="btn btn-ghost" type="button">重载频道</button>
        </div>
        <div class="status">
            <span id="status_dot" class="dot"></span>
            <span id="status_text">初始化中...</span>
        </div>
    </section>

    <section class="stage" id="player_stage">
        <div id="video_container"></div>
        <div id="placeholder" class="placeholder">请选择频道后开始播放</div>
    </section>
</div>

<script charset="utf-8" src="/src/js/xgplayer-3.0.13/index.min.js"></script>
<script charset="utf-8" src="/src/js/xgplayer-hls-3.0.13/index.min.js"></script>
<script>
    const els = {
        select: document.getElementById("video_select"),
        playBtn: document.getElementById("play_btn"),
        reloadBtn: document.getElementById("reload_btn"),
        statusDot: document.getElementById("status_dot"),
        statusText: document.getElementById("status_text"),
        placeholder: document.getElementById("placeholder"),
        stage: document.getElementById("player_stage")
    };

    let videoPlayer = null;

    function setStatus(text, level) {
        els.statusText.textContent = text;
        els.statusDot.className = "dot " + (level || "");
    }

    async function requestJSON(url) {
        const resp = await fetch(url, {method: "GET"});
        const data = await resp.json();
        if (!resp.ok || data.code !== 0) {
            throw new Error(data.msg || ("HTTP " + resp.status));
        }
        return data.data;
    }

    function getSize() {
        return {
            width: Math.max(els.stage.clientWidth, 320),
            height: Math.max(els.stage.clientHeight, 220)
        };
    }

    function destroyPlayer() {
        if (videoPlayer) {
            videoPlayer.destroy();
            videoPlayer = null;
        }
    }

    function createPlayer(url) {
        destroyPlayer();
        const size = getSize();
        const config = {
            id: "video_container",
            url: url,
            playsinline: true,
            plugins: [HlsPlayer],
            width: size.width,
            height: size.height,
            isLive: true,
            autoplay: true
        };
        videoPlayer = new Player(config);
        els.placeholder.style.display = "none";
        setStatus("播放中", "ok");
    }

    function renderChannels(list, keepSelected) {
        const prev = keepSelected ? els.select.value : "";
        els.select.innerHTML = "";
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "请选择频道";
        els.select.appendChild(placeholder);

        list.forEach((tv) => {
            const opt = document.createElement("option");
            opt.value = tv.live || "";
            opt.textContent = tv.name || tv.live || "未命名频道";
            els.select.appendChild(opt);
        });

        if (prev) {
            els.select.value = prev;
        }
        if (!els.select.value && list.length > 0) {
            els.select.value = list[0].live || "";
        }
    }

    async function loadChannels(keepSelected) {
        const list = await requestJSON("/tvs");
        renderChannels(list || [], keepSelected);
        if (!list || list.length === 0) {
            setStatus("未发现可播放频道", "warn");
            els.placeholder.textContent = "暂无频道，请稍后重试";
            els.placeholder.style.display = "grid";
            destroyPlayer();
            return;
        }
        setStatus("频道已更新，共 " + list.length + " 个", "ok");
    }

    function playSelected() {
        const src = (els.select.value || "").trim();
        if (!src) {
            destroyPlayer();
            els.placeholder.textContent = "请选择频道后开始播放";
            els.placeholder.style.display = "grid";
            setStatus("等待选择频道", "warn");
            return;
        }
        try {
            createPlayer(src);
        } catch (err) {
            setStatus("播放器初始化失败: " + err.message, "bad");
        }
    }

    async function safeLoadChannels(keepSelected) {
        try {
            await loadChannels(keepSelected);
        } catch (err) {
            setStatus("拉取频道失败: " + err.message, "bad");
        }
    }

    els.playBtn.addEventListener("click", playSelected);
    els.select.addEventListener("change", playSelected);
    els.reloadBtn.addEventListener("click", () => safeLoadChannels(true));

    window.addEventListener("resize", () => {
        if (videoPlayer && typeof videoPlayer.resize === "function") {
            const size = getSize();
            videoPlayer.resize(size.width, size.height);
        }
    });

    (async () => {
        await safeLoadChannels(false);
        playSelected();
        setInterval(() => {
            safeLoadChannels(true);
        }, 20000);
    })();
</script>
</body>
</html>
